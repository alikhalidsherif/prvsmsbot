services:
  prvsmsbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prvsmsbot
    restart: unless-stopped
    init: true
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from prvsmsbot.config import Settings; Settings.from_env().validate(); print('ok')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${WEBHOOK_PORT:-8090}:${WEBHOOK_PORT:-8090}"
